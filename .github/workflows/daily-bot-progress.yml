name: Daily Bot Learning Progress

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-progress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily progress update
        run: python bots-learning/update_progress.py

      - name: Commit and push updated bot files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bots-learning/bot_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit — all bots are up to date."
          else
            git commit -m "chore: daily bot learning progress update $(date -u +%Y-%m-%d)"
            git push origin HEAD
          fi
