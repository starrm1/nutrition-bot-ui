name: Validate Bot JSON Files

on:
  push:
    paths:
      - 'bots-learning/**.json'
  pull_request:
    paths:
      - 'bots-learning/**.json'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required fields in bot JSON files
        run: python3 scripts/validate_bots.py
