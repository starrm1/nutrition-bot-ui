<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nutrition Bot UI | Welcome</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7fff8;
      --card: #ffffff;
      --text: #143029;
      --muted: #4f6b63;
      --accent: #2dbb76;
      --accent-2: #ff8a3d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #dfffe7, transparent 45%),
                  radial-gradient(circle at bottom left, #ffe9db, transparent 40%),
                  var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .welcome {
      width: min(920px, 100%);
      background: var(--card);
      border-radius: 24px;
      padding: min(6vw, 48px);
      box-shadow: 0 18px 55px rgba(20, 48, 41, 0.12);
      display: grid;
      gap: 28px;
      align-items: center;
    }

    @media (min-width: 860px) {
      .welcome {
        grid-template-columns: 1.1fr 1fr;
      }
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .cta {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #1f9d62);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 13px 26px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(45, 187, 118, 0.35);
    }

    .hero {
      border-radius: 20px;
      min-height: 280px;
      padding: 22px;
      background: linear-gradient(165deg, #fff3e8, #ffe4cf 45%, #d8ffe4 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(1px);
    }

    .hero::before {
      width: 180px;
      height: 180px;
      top: -45px;
      right: -35px;
      background: rgba(255, 138, 61, 0.35);
    }

    .hero::after {
      width: 150px;
      height: 150px;
      bottom: -52px;
      left: -26px;
      background: rgba(45, 187, 118, 0.35);
    }

    .hero-label {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(20, 48, 41, 0.08);
      border-radius: 14px;
      padding: 14px 16px;
      max-width: 260px;
      backdrop-filter: blur(3px);
    }

    .hero-label strong {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .hero-label span {
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="welcome" aria-label="Nutrition bot onboarding welcome">
    <section>
      <h1>Welcome</h1>
      <p>
        Start your healthy eating journey with Nutrition Bot. We will guide you through simple steps to track meals,
        learn nutrition basics, and build habits that fit your day.
      </p>
      <button class="cta" type="button">Get Started</button>
    </section>
    <aside class="hero" aria-label="Fruit Burst hero visual placeholder">
      <div class="hero-label">
        <strong>Fruit Burst</strong>
        <span>Hero theme placeholder for the canonical welcome visual.</span>
      </div>
    </aside>
  </main>
</body>
</html>
